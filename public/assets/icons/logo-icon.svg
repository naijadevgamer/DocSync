<svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#0F172A" flood-opacity="0.1"/>
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="iconGradientIcon" x1="0%" y1="0%" x2="0%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#24ae7c"/>
      <stop offset="30%" stop-color="#24ae7c"/>
      <stop offset="70%" stop-color="#0860b2ff"/>
      <stop offset="100%" stop-color="#0860b2ff"/>
    </linearGradient>

    <linearGradient id="bgGradientIcon" x1="50%" y1="0%" x2="50%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
  </defs>

  
  
  <!-- Icon Container -->
  <g filter="url(#iconShadow)">
    <!-- Adjusted to match your logo's slightly rectangular proportions -->
    <rect x="3" y="3" width="32" height="32" rx="8" fill="url(#bgGradientIcon)"/>
    <rect x="3" y="3" width="32" height="32" rx="8" stroke="#CBD5E1" stroke-width="0.2"/>
    
    <!-- Abstract Icon: Healthcare + Sync Concept - matching your design -->
    <circle cx="19" cy="18" r="12" fill="url(#iconGradientIcon)"/>
    
    
    <!-- Cross for healthcare - matching your thicker stroke -->
    <!-- <path d="M19 12V20M15 16H23" stroke="white" stroke-width="2.5" stroke-linecap="round"/> -->
    <path d="M19 14V23M15 18H23" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Sync arrows - matching your color scheme and positioning -->
    <!-- <path d="M14 13L11 10L14 7" stroke="#24ae7c" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M24 23L27 26L24 29" stroke="#24ae7c" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/> -->

    <path d="M13 12L9 8L13 4" stroke="#24ae7c" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M25 24L29 28L25 32" stroke="#0860b2ff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>