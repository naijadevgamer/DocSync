<svg width="130" height="38" viewBox="0 0 130 38" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#0F172A" flood-opacity="0.1"/>
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="0%" y2="100%" gradientUnits="userSpaceOnUse">
     <stop offset="0%" stop-color="#24ae7c"/>
      <stop offset="30%" stop-color="#24ae7c"/>
      <stop offset="70%" stop-color="#0860b2ff"/>
      <stop offset="100%" stop-color="#0860b2ff"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="50%" y1="0%" x2="50%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
  <stop offset="0%" stop-color="white"/>
  <stop offset="30%" stop-color="white"/>
  <stop offset="70%" stop-color="#24ae7c"/> 
  <stop offset="100%" stop-color="#24ae7c"/>
</linearGradient>
  </defs>
  
  <!-- Icon Container -->
  <g filter="url(#shadow)">
    <rect x="3" y="2" width="32" height="32" rx="6" fill="url(#bgGradient)"/>
    <rect x="3" y="2" width="32" height="32" rx="6" stroke="#CBD5E1" stroke-width="0.2"/>
    
    <!-- Abstract Icon: Healthcare + Sync Concept -->
   

    <circle cx="19" cy="18" r="11" fill="url(#iconGradient)" />
    
    <!-- Cross for healthcare -->
    <path d="M19 14V22M15 18H23" stroke="white" stroke-width="3" stroke-linecap="round"/>

    
    <!-- Sync arrows -->
    <path d="M13 12L9 8L13 4" stroke="#24ae7c" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M25 24L29 28L25 32" stroke="#0860b2ff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  </g>
  
  <!-- Brand Name "DocSync" -->
  <text x="40" y="24" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" letter-spacing="0.5" fill="url(#textGradient)">DocSync</text>
</svg>